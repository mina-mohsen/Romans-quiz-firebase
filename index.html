<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسابقة رسالة كورنثوس الثانية الشاملة</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --success: #27ae60;
            --danger: #c0392b;
            --light: #f4f7f6;
            --white: #ffffff;
            --skipped: #f39c12;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: #bdc3c7; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--white); 
            padding: 15px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
        }
        
        header { text-align: center; border-bottom: 2px solid var(--light); padding-bottom: 10px; margin-bottom: 15px; position: sticky; top: 0; background: var(--white); z-index: 10; }
        h1 { font-size: 1.2rem; margin: 10px 0; color: var(--primary); }

        #timer-box { background: #fdedec; color: var(--danger); padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 1.1rem; display: inline-block; border: 2px solid var(--danger); }
        
        .screen { display: none; flex-direction: column; gap: 15px; }
        .active-screen { display: flex; }

        label { font-size: 0.9rem; font-weight: bold; color: var(--primary); margin-bottom: -10px; margin-right: 5px; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 1rem; width: 100%; }

        .btn-main { background: var(--primary); color: white; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        .btn-main:active { transform: scale(0.97); }

        .option-item { background: #f8f9f9; padding: 14px; border-radius: 12px; cursor: pointer; border: 2px solid #ebedef; margin-bottom: 8px; text-align: right; }
        .option-item.selected { background: #ebf5fb; border-color: var(--primary); font-weight: bold; }

        .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 6px; margin-top: 20px; padding-top: 15px; border-top: 2px solid #eee; }
        .nav-dot { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
        .nav-dot.current { background: var(--primary); color: white; border: 2px solid #34495e; }
        .nav-dot.answered { background: var(--success); color: white; }

        .review-card { padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; font-size: 0.9rem; text-align: right; }
        .review-card.correct-card { border-right: 5px solid var(--success); background: #f0f9f4; }
        .review-card.wrong-card { border-right: 5px solid var(--danger); background: #fdf2f2; }

        .block-message { text-align: center; color: var(--danger); font-weight: bold; padding: 20px; }
        #status-msg { font-size: 1rem; margin-top: 15px; text-align: center; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>مسابقة رسالة كورنثوس الثانية (50 سؤال)</h1>
        <div id="timer-box" style="display:none;">40:00</div>
    </header>

    <!-- Blocked Screen -->
    <div id="block-screen" class="screen">
        <div class="block-message">
            <h2>عذراً!</h2>
            <p>لقد شاركت بالفعل في هذه المسابقة. يُسمح بمحاولة واحدة فقط لكل مستخدم.</p>
            <button class="btn-main" style="margin-top:20px" onclick="switchScreen('reg-screen')">العودة (للمسؤول فقط)</button>
        </div>
    </div>

    <!-- Registration -->
    <div id="reg-screen" class="active-screen screen">
        <div style="text-align: center;"><img src="https://imgur.com/hH7HWvE.jpeg" style="width: 100px; height: 100px; border-radius: 50%;" alt="logo"></div>
        <input type="text" id="u-name" placeholder="الاسم بالكامل">
        <input type="tel" id="u-phone" placeholder="رقم الموبايل">
        <input type="text" id="u-address" placeholder="العنوان أو الكنيسة">
        <label for="u-birthdate">تاريخ الميلاد:</label>
        <input type="date" id="u-birthdate">
        <button class="btn-main" onclick="startQuiz()">بدء الاختبار</button>
    </div>

    <!-- Questions -->
    <div id="quiz-screen" class="screen">
        <div id="q-wrapper"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-main" style="background:#95a5a6;" onclick="nav(-1)">السابق</button>
            <button class="btn-main" onclick="nav(1)">التالي</button>
        </div>
        <button id="finish-btn" class="btn-main" style="background:var(--success); display: none; margin-top: 5px;" onclick="finishQuiz()">إنهاء وحفظ النتيجة</button>
        <div class="nav-grid" id="nav-grid"></div>
    </div>

    <!-- Results -->
    <div id="finish-screen" class="screen">
        <div style="text-align:center;">
            <h2 style="color: var(--success);">تمت عملية الإرسال!</h2>
            <div id="status-msg">جاري التأكيد...</div>
            <div id="final-score" style="font-size: 3rem; font-weight: bold; color: var(--primary); margin: 15px 0;">0/50</div>
            <p style="color: #7f8c8d;">تم تسجيل إجاباتك بنجاح في قاعدة البيانات (الإكسيل).</p>
            
            <button class="btn-main" style="background:#3498db; width: 100%; margin-top: 15px;" onclick="toggleReview()">مراجعة الإجابات</button>
        </div>
        <div id="review-list" style="display:none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px;"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGvzORDW-DEuH9RSH3Mpk05xalEzOAeGraC8wo0jjPcdJX02TFy1Z04x8Kkf5qv89dIw/exec";

    const questions = [
        // الأصحاح 1
        { q: "من اشترك مع بولس في كتابة الرسالة بحسب التحية؟", options: ["بطرس", "تيموثاوس", "تيطس", "لوقا"], correct: 1 },
        { q: "بماذا وصف بولس الله في بداية الأصحاح الأول؟", options: ["إله الجنود", "أب الرأفات وإله كل تعزية", "ديان الأرض", "خالق المسكونة"], correct: 1 },
        { q: "لماذا يعزينا الله في كل ضيقتنا؟", options: ["لكي نتفاخر", "لكي نستطيع أن نعزي الذين هم في كل ضيقة", "لكي نبني كنائس", "لكي نترك الخدمة"], correct: 1 },
        { q: "أين حدثت الضيقة التي جعلت بولس ييأس من الحياة؟", options: ["في روما", "في أورشليم", "في أسيا", "في قبرص"], correct: 2 },
        { q: "كان حكم الموت في أنفسنا لكي لا نكون متكلين على أنفسنا بل على...؟", options: ["أصدقائنا", "الله الذي يقيم الأموات", "حكمتنا", "القانون"], correct: 1 },
        { q: "ماذا طلب بولس من أهل كورنثوس أن يفعلوه من أجله في ضيقاته؟", options: ["يرسلوا مالاً", "يساعدوه بالصلاة", "يحاربوا عنه", "يهربوا معه"], correct: 1 },
        { q: "وعود الله في المسيح هي الـ... والـ...؟", options: ["نعم / الآمين", "لا / كلا", "الربح / الخسارة", "البدء / النهاية"], correct: 0 },
        { q: "من هو الذي يثبتنا معكم في المسيح وقد مسحنا؟", options: ["بطرس", "تيموثاوس", "الله", "الملاك"], correct: 2 },
        { q: "ما هو العربون الذي أعطاه الله في قلوبنا؟", options: ["السلام", "الروح القدس", "الفرح", "الصبر"], correct: 1 },
        // الأصحاح 2
        { q: "لماذا قرر بولس ألا يأتي إليهم في حزن؟", options: ["لأنه كان مريضاً", "لكي لا يحزنهم بل يفرح بهم", "لأنه خاف منهم", "لأنه سافر لمكان آخر"], correct: 1 },
        { q: "ماذا كتب بولس لهم بدموع كثيرة؟", options: ["وصايا جديدة", "توبيخاً قارساً لكي لا يحزنوا بل يعرفوا محبته", "خطة السفر", "شرحاً للناموس"], correct: 1 },
        { q: "عن الشخص الذي أحزن الجميع، ماذا طلب بولس منهم؟", options: ["أن يطردوه", "أن يسامحوه ويعزوه", "أن يتجاهلوه", "أن يجلدوه"], correct: 1 },
        { q: "لماذا يجب أن نسامح؟ لئلا يطمع فينا...؟", options: ["الرومان", "الشيطان", "اليهود", "الفلاسفة"], correct: 1 },
        { q: "أين لم يجد بولس راحة لروحه لأنه لم يجد تيطس أخاه؟", options: ["في ترواس", "في أفسس", "في مكدونية", "في قبرص"], correct: 0 },
        { q: "الله يقودنا في موكب... في المسيح كل حين؟", options: ["الصلاة", "النصرة", "الألم", "الخدمة"], correct: 1 },
        { q: "نحن رائحة المسيح الذكية لله في...؟", options: ["الذين يخلصون والذين يهلكون", "المؤمنين فقط", "السماء فقط", "أهل أورشليم فقط"], correct: 0 },
        // الأصحاح 3
        { q: "من هي رسالة بولس المكتوبة في القلوب؟", options: ["الكتب المقدسة", "أهل كورنثوس أنفسهم", "رسائل الرسل", "الوصايا العشر"], correct: 1 },
        { q: "رسالة المسيح ليست مكتوبة بحبر بل بـ...؟", options: ["قلم رصاص", "روح الله الحي", "دموع بولس", "دم الشهداء"], correct: 1 },
        { q: "الحرف يقتل ولكن الروح...؟", options: ["يهدي", "يحيي", "يبني", "ينذر"], correct: 1 },
        { q: "لماذا كان بنو إسرائيل لا يقدرون أن ينظروا إلى وجه موسى؟", options: ["بسبب طول لحيته", "بسبب بريق وجهه (المجد)", "بسبب غضب موسى", "بسبب الشمس"], correct: 1 },
        { q: "أينما كان روح الرب فهناك...؟", options: ["قوة", "حرية", "خوف", "سكون"], correct: 1 },
        { q: "نحن جميعاً ناظرين مجد الرب بوجه مكشوف نتغير إلى تلك الصورة من...؟", options: ["قوة إلى قوة", "مجد إلى مجد", "فرح إلى فرح", "بر إلى بر"], correct: 1 },
        // الأصحاح 4
        { q: "بماذا وصف بولس إله هذا الدهر (الشيطان)؟", options: ["أنه مضل", "أنه أعمى أذهان غير المؤمنين", "أنه عدو الخير", "أنه أسد زائر"], correct: 1 },
        { q: "الله الذي قال أن يشرق نور من ظلمة هو الذي أشرق في...؟", options: ["العالم", "قلوبنا", "الكنيسة", "الشمس"], correct: 1 },
        { q: "لنا هذا الكنز في أوانٍ...؟", options: ["ذهبية", "خزفية", "فضية", "نحاسية"], correct: 1 },
        { q: "نحن مضغوطون من كل جانب لكن غير...؟", options: ["متحيرين", "متضايقين", "يائسين", "منكسرين"], correct: 1 },
        { q: "خفيف ضيقتنا الوقتي ينشئ لنا أكثر فأكثر ثقل... أبدياً؟", options: ["راحة", "مجد", "جزاء", "ملك"], correct: 1 },
        { q: "الأشياء التي تُرى... أما التي لا تُرى فـ...؟", options: ["وقتية / أبدية", "حقيقية / خيالية", "جميلة / قبيحة", "صعبة / سهلة"], correct: 0 },
        // الأصحاح 5
        { q: "إن نقض بيت خيمتنا الأرضي (الجسد)، فلنا بناء من الله...؟", options: ["في أورشليم", "بيت غير مصنوع بيد أبدي في السماوات", "في القبر", "في روما"], correct: 1 },
        { q: "لأننا نسلك بـ... لا بالعيان؟", options: ["العقل", "الإيمان", "القوة", "الخبرة"], correct: 1 },
        { q: "لأنه لابد أننا جميعاً نُظهر أمام كرسي...؟", options: ["بطرس", "المسيح", "الملك", "القضاء"], correct: 1 },
        { q: "محبة المسيح...؟", options: ["ترشدنا", "تحصرنا", "تفرحنا", "تعزينا"], correct: 1 },
        { q: "إن كان أحد في المسيح فهو...؟", options: ["خليقة جديدة", "خادم أمين", "تلميذ بار", "قديس عظيم"], correct: 0 },
        { q: "الله كان في المسيح مصالحاً... لنفسه؟", options: ["اليهود", "العالم", "الرسل", "الأمم"], correct: 1 },
        { q: "نسعى كـ... عن المسيح كأن الله يعظ بنا؟", options: ["جنود", "سفراء", "خدام", "وكلاء"], correct: 1 },
        // الأصحاح 6
        { q: "يقول بولس: هوذا الآن وقت... هوذا الآن يوم...؟", options: ["صلاة / فرح", "مقبول / خلاص", "خدمة / ضيق", "توبة / سلام"], correct: 1 },
        { q: "لا تكونوا تحت نير مع...؟", options: ["الخطاة", "غير المؤمنين", "الأغنياء", "الفقراء"], correct: 1 },
        { q: "أية شركة للبر والإثم؟ وأي اتصال للنور والـ...؟", options: ["شر", "ظلمة", "موت", "نار"], correct: 1 },
        { q: "أنتم هيكل...؟", options: ["سليمان", "الله الحي", "الجسد", "القدس"], correct: 1 },
        // الأصحاح 7
        { q: "بماذا تعزى بولس عند مجيء تيطس؟", options: ["بإرسالية المال", "بتعزية أهل كورنثوس وأشواقهم", "بأخبار السفر", "بالهدايا"], correct: 1 },
        { q: "الحزن الذي بحسب مشيئة الله ينشئ...؟", options: ["بكاءً", "توبة للخلاص بلا ندامة", "يأساً", "مرضاً"], correct: 1 },
        { q: "حزن العالم ينشئ...؟", options: ["توبة", "موتاً", "فرحاً", "تغييراً"], correct: 1 },
        // الأصحاح 8 و 9
        { q: "أي كنائس ضرب بها بولس المثل في سخاء العطاء رغم فقرها؟", options: ["غلاطية", "مكدونية", "أفسس", "روما"], correct: 1 },
        { q: "تعرفون نعمة ربنا يسوع أنه من أجلكم افتقر وهو... لكي تستغنوا أنتم بفقره؟", options: ["ملك", "غني", "قوي", "قدوس"], correct: 1 },
        { q: "من يزرع بالشح فبالشح أيضاً...؟", options: ["يحصد", "ينمو", "يربح", "يعطي"], correct: 0 },
        { q: "المعطي... يحبه الله؟", options: ["الكثير", "المسرور", "المجبر", "الحكيم"], correct: 1 },
        // الأصحاح 10 إلى 12
        { q: "أسلحة محاربتنا ليست... بل قادرة بالله على هدم حصون؟", options: ["ضعيفة", "جسدية", "قديمة", "قليلة"], correct: 1 },
        { q: "من افتخر فليفتخر بـ...؟", options: ["نفسه", "بالرب", "بأعماله", "بذكائه"], correct: 1 },
        { q: "كم مرة جلد بولس من اليهود أربعين إلا واحداً؟", options: ["مرة", "ثلاث مرات", "خمس مرات", "عشر مرات"], correct: 2 },
        { q: "أين اختطف بولس ورأى أشياء لا يسوغ لإنسان أن يتكلم بها؟", options: ["إلى دمشق", "إلى الفردوس (السماء الثالثة)", "إلى الهيكل", "إلى جبل سيناء"], correct: 1 },
        { q: "ماذا أعطي لبولس لئلا يرتفع بفرط الإعلانات؟", options: ["مرض عينين", "شوكة في الجسد", "فقر شديد", "اضطهاد"], correct: 1 },
        { q: "بماذا أجاب الرب بولس حين طلب رفع الشوكة؟", options: ["سأرفعها غداً", "تكفيك نعمتي لأن قوتي في الضعف تكمل", "اصبر قليلاً", "أنت رجل قوي"], correct: 1 }
    ];

    let current = 0, answers = new Array(questions.length).fill(null), timeLeft = 40 * 60, timer;
    let userData = {};

    function startQuiz() {
        const nameInput = document.getElementById('u-name').value.trim();
        if (nameInput === "adminreset") {
            localStorage.removeItem('quiz_completed_2co_50');
            alert("تم مسح الحظر بنجاح.");
            location.reload();
            return;
        }

        if (localStorage.getItem('quiz_completed_2co_50')) {
            switchScreen('block-screen');
            return;
        }

        userData = {
            name: nameInput,
            phone: document.getElementById('u-phone').value.trim(),
            address: document.getElementById('u-address').value.trim(),
            birthdate: document.getElementById('u-birthdate').value
        };

        if(!userData.name || !userData.phone || !userData.address || !userData.birthdate) return alert("برجاء إدخال كافة البيانات.");
        
        switchScreen('quiz-screen');
        document.getElementById('timer-box').style.display = 'inline-block';
        initQuiz();
        startTimer();
    }

    function initQuiz() {
        const wrapper = document.getElementById('q-wrapper');
        const grid = document.getElementById('nav-grid');
        wrapper.innerHTML = ""; grid.innerHTML = "";
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = `screen ${i===0?'active-screen':''}`;
            div.id = `q-cnt-${i}`;
            div.innerHTML = `<div style="font-weight:bold; margin-bottom:15px; text-align:right;">${i+1}. ${q.q}</div>${q.options.map((opt, idx) => `<div class="option-item" id="opt-${i}-${idx}" onclick="select(${i}, ${idx})">${opt}</div>`).join('')}`;
            wrapper.appendChild(div);
            
            const dot = document.createElement('div');
            dot.className = `nav-dot ${i===0?'current':''}`;
            dot.id = `dot-${i}`; dot.innerText = i+1; dot.onclick = () => jump(i);
            grid.appendChild(dot);
        });
    }

    function select(qIdx, optIdx) {
        answers[qIdx] = optIdx;
        document.querySelectorAll(`#q-cnt-${qIdx} .option-item`).forEach((el, idx) => el.classList.toggle('selected', idx === optIdx));
        document.getElementById(`dot-${qIdx}`).classList.add('answered');
        setTimeout(() => nav(1), 200);
    }

    function jump(n) {
        if(n < 0 || n >= questions.length) return;
        document.querySelectorAll('#q-wrapper > div').forEach(c => c.classList.remove('active-screen'));
        document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('current'));
        current = n;
        document.getElementById(`q-cnt-${current}`).classList.add('active-screen');
        document.getElementById(`dot-${current}`).classList.add('current');
        document.getElementById('finish-btn').style.display = (current === questions.length - 1) ? 'block' : 'none';
    }

    function nav(step) { let t = current + step; if(t >= 0 && t < questions.length) jump(t); }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            if(timeLeft <= 0) finishQuiz();
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer-box').innerText = `${m}:${s<10?'0':''}${s}`;
        }, 1000);
    }

    function finishQuiz() {
        clearInterval(timer);
        localStorage.setItem('quiz_completed_2co_50', 'true');

        let score = 0;
        questions.forEach((q, i) => { if(answers[i] === q.correct) score++; });
        
        document.getElementById('final-score').innerText = `${score}/${questions.length}`;
        switchScreen('finish-screen');
        document.getElementById('timer-box').style.display = 'none';
        
        saveToGoogleSheets(score);
        generateReview();
    }

    async function saveToGoogleSheets(score) {
        const status = document.getElementById('status-msg');
        status.innerText = "جاري إرسال النتيجة للسجل...";

        const data = { ...userData, quizName: "2 Corinthians 50Q", score: score, timestamp: new Date().toLocaleString('ar-EG') };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            status.innerText = "تم حفظ النتائج في الإكسيل بنجاح ✅";
            status.style.color = "var(--success)";
        } catch (error) {
            status.innerText = "تم تسجيل نتيجتك بنجاح.";
        }
    }

    function generateReview() {
        const reviewList = document.getElementById('review-list');
        let html = "";
        questions.forEach((q, i) => {
            const isCorrect = answers[i] === q.correct;
            html += `
                <div class="review-card ${isCorrect ? 'correct-card' : 'wrong-card'}">
                    <b>${i + 1}. ${q.q}</b>
                    <div style="margin-top:5px;">
                        <span>إجابتك: ${answers[i] !== null ? q.options[answers[i]] : 'لم يتم الإجابة'}</span>
                        ${!isCorrect ? `<br><span style="color:var(--success)">الصحيح: ${q.options[q.correct]}</span>` : ''}
                    </div>
                </div>`;
        });
        reviewList.innerHTML = html;
    }

    function toggleReview() {
        const list = document.getElementById('review-list');
        list.style.display = list.style.display === 'none' ? 'block' : 'none';
    }

    function switchScreen(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); 
        document.getElementById(id).classList.add('active-screen'); 
    }
</script>
</body>
</html>
